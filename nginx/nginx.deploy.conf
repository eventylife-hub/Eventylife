# Nginx — Premier déploiement Eventy Life
# HTTP uniquement — Cloudflare gère HTTPS en amont
# api.eventylife.fr → Cloudflare (SSL) → ce serveur (HTTP:80) → backend (4000)

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/m;

server {
    listen 80;
    server_name api.eventylife.fr;

    # Cloudflare envoie l'IP réelle dans CF-Connecting-IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Sécurité — accepter uniquement le trafic Cloudflare
    # (optionnel mais recommandé — décommenter après vérification)
    # if ($http_cf_connecting_ip = "") { return 403; }

    # Headers sécurité
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Upload max
    client_max_body_size 25M;

    # Health check (pas de rate limit)
    location /api/health {
        proxy_pass http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Auth endpoints — rate limit strict (brute force)
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 10s;
    }

    location /api/auth/register {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 10s;
    }

    location /api/auth/forgot-password {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 10s;
    }

    # Stripe webhook — raw body, pas de rate limit agressif
    location /api/payments/webhook {
        limit_req zone=webhook burst=50;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # API principale
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;

        # CORS préflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "https://eventylife.fr" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Idempotency-Key, X-CSRF-Token" always;
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
    }

    # Swagger — bloqué en prod
    location /api/docs {
        return 403 "Non disponible en production";
    }

    # Tout le reste → 404
    location / {
        return 404;
    }
}
