name: Maintenance Fix
on:
  workflow_dispatch:
jobs:
  maintenance:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fix Sentry and seed admin
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          script: |
            echo "" | base64 -d > /tmp/seed_admin.js
            SENTRY=$(find /opt/eventy /root /home -name sentry.interceptor.js 2>/dev/null | grep dist | head -1)
            if [ -n "$SENTRY" ]; then sed -i 's/transaction\.finish()/transaction?.finish()/g' "$SENTRY" && echo "Sentry patched"; fi
            BACKEND=$(find /opt/eventy /root /home -maxdepth 8 -name package.json 2>/dev/null | grep -v node_modules | xargs grep -l prisma 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
            [ -z "$BACKEND" ] && BACKEND=/opt/eventy/app/backend
            cd "$BACKEND" && [ -f .env ] && export $(grep -v '^#' .env | xargs)
            NODE_PATH="$BACKEND/node_modules" node /tmp/seed_admin.js && echo "Seed OK"
            pm2 restart eventy-api 2>/dev/null || pm2 restart all 2>/dev/null || true
            pm2 save 2>/dev/null || true
            echo "Done"
